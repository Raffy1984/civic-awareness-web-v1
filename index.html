<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidato per un Giorno - Idoneità Civica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Candidato per un Giorno</h1>
            <p>Metti alla prova la tua conoscenza del Comune e genera il tuo programma elettorale basato su dati reali.</p>
        </header>

        <!-- CONFIGURAZIONE INIZIALE -->
        <section id="config-iniziale" class="card">
            <h2>Pronto a candidarti?</h2>
            <div class="form-group">
                <label for="nome-candidato">Inserisci il tuo Nome / Nome Lista:</label>
                <input type="text" id="nome-candidato" placeholder="Es. Mario Rossi o Lista Civica Per il Paese">
            </div>
            <button id="btn-inizio" onclick="iniziaSimulazione()">Inizia la Simulazione</button>
        </section>

        <!-- AREA GIOCO (QUIZ) -->
        <section id="area-quiz" class="card hidden">
            <div class="quiz-header">
                <span id="badge-sezione" class="badge">Sezione</span>
                <div class="progress-bar-container">
                    <div id="barra-avanzamento" class="progress-bar"></div>
                </div>
            </div>
            
            <h3 id="testo-domanda">Domanda di esempio?</h3>
            <div id="opzioni-risposta" class="opzioni-container">
                <!-- I bottoni delle risposte verranno inseriti dinamicamente qui -->
            </div>

            <div id="feedback-risposta" class="feedback-box hidden">
                <p id="testo-feedback"></p>
                <button id="btn-successivo" onclick="prossimaDomanda()">Avanti</button>
            </div>
        </section>

        <!-- RISULTATO FINALE E PROGRAMMA ELETTORALE -->
        <section id="area-risultato" class="card hidden">
            <!-- Il programma elettorale completo verrà stampato qui dinamicamente -->
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
