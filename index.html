<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patente Consapevolezza Civica</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* INTRO */
.intro{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 60%),
    url("https://upload.wikimedia.org/wikipedia/commons/0/03/Italy_satellite_map.jpg");
  background-size:cover;
  background-position:center;
}

.overlay{
  background:rgba(0,0,0,0.65);
  padding:30px;
  border-radius:18px;
  max-width:700px;
}

h1{
  font-size:34px;
  margin-bottom:10px;
}

p{
  opacity:0.85;
}

/* DASHBOARD */
.dashboard{
  display:none;
  padding:25px;
  max-width:900px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

.card{
  background:#111a2e;
  padding:20px;
  border-radius:14px;
  margin-top:16px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}

.primary{background:#22c55e;color:#000;}
.secondary{background:#1f2937;color:#fff;}

/* QUIZ */
.quiz{
  display:none;
  padding:25px;
  max-width:900px;
  margin:auto;
}

.tag{
  font-size:12px;
  opacity:0.7;
}

.answer{
  background:#0f172a;
  border:1px solid #334155;
  color:white;
  margin:8px 0;
  text-align:left;
}

.answer:hover{
  background:#1e293b;
}

/* REPORT */
.report{
  display:none;
  padding:25px;
  max-width:900px;
  margin:auto;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <div class="overlay">
    <h1>Patente di Consapevolezza Civica</h1>
    <p>
      Non è un test di conoscenza.<br>
      È una simulazione delle conseguenze reali delle decisioni pubbliche.
    </p>

    <button class="primary" onclick="go()">Inizia</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dash">
  <h2>Scegli area</h2>

  <div class="card">
    <button class="primary" onclick="start('nazionale')">🇮🇹 Nazionale</button>
    <button class="secondary" onclick="start('regionale')">🏛 Regione</button>
    <button class="secondary" onclick="start('comunale')">🏙 Comune</button>
  </div>
</div>

<!-- QUIZ -->
<div class="quiz" id="quiz"></div>

<!-- REPORT -->
<div class="report" id="report"></div>

<script>

/* =========================
   DATASET REALISTICO
========================= */

const DB = {
  nazionale:[
    {
      cat:"Economia reale",
      q:"Il costo della vita aumenta rapidamente, ma i salari restano fermi. Quale misura può dare sollievo immediato ma crea rischio inflattivo?",
      a:[
        {t:"Aumento salari pubblici generalizzato",v:1},
        {t:"Riduzione spesa sanitaria",v:0},
        {t:"Blocco totale investimenti pubblici",v:0},
        {t:"Aumento tasse indirette",v:0}
      ]
    },
    {
      cat:"Energia",
      q:"Un aumento del prezzo dell’energia colpisce famiglie e imprese. Quale intervento ha effetto più lento ma strutturale?",
      a:[
        {t:"Investimenti in rinnovabili",v:1},
        {t:"Sussidi temporanei ai carburanti",v:0},
        {t:"Riduzione salari pubblici",v:0},
        {t:"Aumento IVA energia",v:0}
      ]
    }
  ],

  regionale:[
    {
      cat:"Sanità",
      q:"Le liste d’attesa aumentano. Quale intervento migliora il sistema nel medio periodo?",
      a:[
        {t:"Assunzione personale sanitario e riorganizzazione strutturale",v:1},
        {t:"Riduzione numero ospedali",v:0},
        {t:"Taglio budget sanitario",v:0},
        {t:"Privatizzazione totale immediata",v:0}
      ]
    }
  ],

  comunale:[
    {
      cat:"Mobilità",
      q:"Una città è congestionata dal traffico privato. Quale misura è più efficace nel medio termine?",
      a:[
        {t:"Potenziare trasporto pubblico e ZTL",v:1},
        {t:"Eliminare tutte le regole stradali",v:0},
        {t:"Aumentare parcheggi centrali",v:0},
        {t:"Ridurre illuminazione stradale",v:0}
      ]
    }
  ]
};

/* =========================
   STATE
========================= */

let state={
  level:"",
  i:0,
  score:0,
  q:[]
};

/* =========================
   NAV
========================= */

function go(){
  document.getElementById("intro").style.display="none";
  document.getElementById("dash").style.display="block";
}

/* =========================
   START
========================= */

function start(l){
  state.level=l;
  state.q=DB[l];
  state.i=0;
  state.score=0;

  document.getElementById("dash").style.display="none";
  document.getElementById("quiz").style.display="block";

  render();
}

/* =========================
   RENDER
========================= */

function render(){

  const q=state.q[state.i];

  if(!q) return finish();

  document.getElementById("quiz").innerHTML=`
    <div class="card">
      <div class="tag">${state.level} · ${q.cat}</div>
      <h3>${q.q}</h3>
    </div>

    <div class="card">
      ${q.a.map(x=>`
        <button class="answer" onclick="answer(${x.v})">${x.t}</button>
      `).join("")}
    </div>

    <div class="card">
      ${state.i+1}/${state.q.length}
    </div>
  `;
}

/* =========================
   ANSWER
========================= */

function answer(v){
  if(v) state.score++;
  state.i++;
  render();
}

/* =========================
   REPORT
========================= */

function finish(){

  document.getElementById("quiz").style.display="none";
  document.getElementById("report").style.display="block";

  let perc=Math.round((state.score/state.q.length)*100);

  document.getElementById("report").innerHTML=`
    <div class="card">
      <h2>Risultato</h2>
      <h1>${perc}%</h1>
      <p>Consapevolezza su impatto delle decisioni pubbliche</p>
    </div>

    <button class="primary" onclick="location.reload()">Restart</button>
  `;
}

</script>

</body>
</html>
