<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Base Fix</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
.container{max-width:800px;margin:auto;padding:20px}
.card{background:white;padding:20px;border-radius:12px;margin-top:20px}
button{width:100%;padding:12px;margin:6px 0;border:0;background:#333;color:white;border-radius:8px}
.answer{background:white;border:1px solid #ccc;color:black}
</style>
</head>

<body>

<div class="container">
  <div id="app">Caricamento...</div>
</div>

<script>

const DB = [
  {
    q:"L'inflazione cosa provoca?",
    a:[
      {t:"Riduce il potere d'acquisto",v:1},
      {t:"Aumenta il potere d'acquisto",v:0},
      {t:"Non ha effetti",v:0},
      {t:"Blocca i prezzi",v:0}
    ]
  },
  {
    q:"Il debito pubblico è:",
    a:[
      {t:"Debiti dello Stato",v:1},
      {t:"Risparmio dello Stato",v:0},
      {t:"Tasse eliminate",v:0},
      {t:"Entrate extra",v:0}
    ]
  }
];

let i = 0;
let score = 0;

const app = document.getElementById("app");

function render(){

  const q = DB[i];

  if(!q){
    app.innerHTML = `<div class="card"><h2>Fine test</h2><p>Punteggio: ${score}/${DB.length}</p><button onclick="location.reload()">Riprova</button></div>`;
    return;
  }

  app.innerHTML = `
    <div class="card">
      <h2>${q.q}</h2>
      ${q.a.map((x,idx)=>`
        <button class="answer" onclick="answer(${idx})">${x.t}</button>
      `).join("")}
    </div>
  `;
}

function answer(idx){
  if(DB[i].a[idx].v) score++;
  i++;
  render();
}

render();

</script>

</body>
</html>
