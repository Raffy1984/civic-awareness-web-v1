<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Insight DEBUG</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f3f5ef;
}

.header{
  background:#1f3a2e;
  color:white;
  padding:14px;
  font-weight:600;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:22px;
  border-radius:14px;
  margin-top:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.error{
  color:red;
  white-space:pre-wrap;
}
button{
  width:100%;
  padding:12px;
  margin:6px 0;
}
</style>
</head>

<body>

<div class="header">Citizen Insight DEBUG</div>

<div class="container">
<div class="card" id="app">Caricamento...</div>
</div>

<script>

try{

console.log("JS AVVIATO");

const app = document.getElementById("app");

if(!app){
  throw new Error("Elemento #app non trovato");
}

const DB = {
  nazionale:[
    {
      q:"Inflazione cosa rappresenta?",
      a:[
        {t:"Aumento prezzi",v:1},
        {t:"Diminuzione prezzi",v:0}
      ]
    }
  ]
};

let state = {
  i:0,
  score:0,
  q:DB.nazionale
};

function home(){
  console.log("HOME OK");

  app.innerHTML = `
    <h2>Funzionamento OK</h2>
    <button onclick="start()">Avvia test</button>
  `;
}

function start(){
  console.log("START OK");
  render();
}

function render(){

  const q = state.q[state.i];

  if(!q){
    app.innerHTML = "<h2>Fine test</h2>";
    return;
  }

  app.innerHTML = `
    <h3>${q.q}</h3>
    ${q.a.map(x=>`
      <button onclick="answer(${x.v})">${x.t}</button>
    `).join("")}
  `;
}

function answer(v){
  if(v) state.score++;
  state.i++;
  render();
}

home();

}catch(e){

document.body.innerHTML =
"<div class='card error'><h2>ERRORE BLOCCANTE</h2><pre>"+e.stack+"</pre></div>";

}

</script>

</body>
</html>
