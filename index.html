<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Insight - Step 3</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2ed;
}

.header{
  background:#1f3a2e;
  color:white;
  padding:14px;
  font-weight:700;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:22px;
  border-radius:16px;
  margin-top:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.primary{background:#1f3a2e;color:white;}
.secondary{background:#e7efe6;color:#111;}
.answer{background:#fff;border:1px solid #ccc;text-align:left;}
.answer:hover{background:#f2f6ef;}

.tag{
  display:inline-block;
  padding:5px 12px;
  border-radius:20px;
  background:#e7efe6;
  font-size:12px;
  margin-bottom:10px;
}

/* PROGRESS BAR */
.bar{
  width:100%;
  background:#e6e6e6;
  border-radius:10px;
  overflow:hidden;
  margin:6px 0 14px;
}

.fill{
  height:10px;
  background:#1f3a2e;
}

/* REPORT BOX */
.metric{
  margin:10px 0;
}
.small{
  font-size:13px;
  color:#666;
}
.big{
  font-size:20px;
  font-weight:700;
}
</style>
</head>

<body>

<div class="header">Citizen Insight Platform</div>

<div class="container">
<div class="card" id="app">Loading...</div>
</div>

<script>

/* =========================
   DATABASE (STABILE)
========================= */

const DB = {
  nazionale:[
    {cat:"Economia",q:"Inflazione significa:",a:[
      {t:"Aumento generale prezzi",v:1},
      {t:"Prezzi fissi",v:0},
      {t:"Zero cambiamenti",v:0}
    ]},
    {cat:"Stato",q:"Il debito pubblico è:",a:[
      {t:"Debito dello Stato",v:1},
      {t:"Risparmi privati",v:0},
      {t:"Tasse eliminate",v:0}
    ]},
    {cat:"Sicurezza",q:"La sicurezza urbana dipende da:",a:[
      {t:"Politiche e forze dell’ordine",v:1},
      {t:"Caso",v:0},
      {t:"Clima",v:0}
    ]},
    {cat:"Energia",q:"Aumento energia causa:",a:[
      {t:"Aumento prezzi generali",v:1},
      {t:"Nulla",v:0},
      {t:"Deflazione automatica",v:0}
    ]},
    {cat:"Economia",q:"Tagliare tasse senza copertura:",a:[
      {t:"Crea deficit",v:1},
      {t:"Genera ricchezza infinita",v:0},
      {t:"Non cambia nulla",v:0}
    ]}
  ],

  regionale:[
    {cat:"Sanità",q:"Liste d’attesa lunghe:",a:[
      {t:"Squilibrio risorse",v:1},
      {t:"Sistema perfetto",v:0},
      {t:"Zero pazienti",v:0}
    ]},
    {cat:"Trasporti",q:"Trasporto inefficiente causa:",a:[
      {t:"Più traffico auto",v:1},
      {t:"Meno persone",v:0},
      {t:"Nessun effetto",v:0}
    ]}
  ],

  comunale:[
    {cat:"Mobilità",q:"Migliorare traffico:",a:[
      {t:"Trasporto pubblico",v:1},
      {t:"Più auto",v:0},
      {t:"Caos totale",v:0}
    ]},
    {cat:"Servizi",q:"Rifiuti mal gestiti:",a:[
      {t:"Degrado urbano",v:1},
      {t:"Città pulita",v:0},
      {t:"Nessun effetto",v:0}
    ]}
  ]
};

/* =========================
   STATE
========================= */

let state = {
  name:"",
  level:"",
  i:0,
  score:0,
  q:[],
  breakdown:{}
};

const app = document.getElementById("app");

/* =========================
   HOME
========================= */

function home(){
  app.innerHTML = `
    <h2>Dashboard</h2>

    <input id="name" placeholder="Inserisci nome">

    <button class="primary" onclick="start('nazionale')">Nazionale</button>
    <button class="secondary" onclick="start('regionale')">Regionale</button>
    <button class="secondary" onclick="start('comunale')">Comunale</button>
  `;
}

/* =========================
   START
========================= */

function start(level){

  state.name = document.getElementById("name").value || "Utente";
  state.level = level;
  state.q = shuffle(DB[level]);
  state.i = 0;
  state.score = 0;
  state.breakdown = {};

  render();
}

/* =========================
   RENDER QUIZ
========================= */

function render(){

  const q = state.q[state.i];

  if(!q) return finish();

  app.innerHTML = `
    <div class="tag">${state.level} · ${q.cat}</div>

    <h3>${q.q}</h3>

    ${shuffle(q.a).map(x=>`
      <button class="answer" onclick="answer(${x.v},'
