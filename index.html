<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patente di Consapevolezza Civica</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="hero-card">

    <h1>Patente di Consapevolezza Civica</h1>

    <p class="subtitle">
      Valuta la tua conoscenza dei principali temi economici,
      sociali e istituzionali che influenzano il dibattito pubblico.
    </p>

    <input
      type="text"
      id="userName"
      placeholder="Inserisci il tuo nome (facoltativo)"
    >

    <button id="startBtn">
      Inizia la valutazione
    </button>

  </div>

  <div id="output"></div>

</div>

<script src="app.js"></script>

</body>
</html>
