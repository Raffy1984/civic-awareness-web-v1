<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Insight</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f3f5ef;
}

.header{
  background:#1f3a2e;
  color:white;
  padding:14px;
  font-weight:600;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:22px;
  border-radius:14px;
  margin-top:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin:10px 0;
}

button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.primary{
  background:#1f3a2e;
  color:white;
}

.secondary{
  background:#e7efe6;
  color:#111;
}

.answer{
  background:#fff;
  border:1px solid #ccc;
}

</style>
</head>

<body>

<div class="header">Citizen Insight Platform</div>

<div class="container">
<div class="card" id="app">Loading...</div>
</div>

<script>

/* =========================
   DATABASE
========================= */

const DB = {
  nazionale:[
    {
      q:"Inflazione cosa rappresenta?",
      a:[
        {t:"Aumento prezzi",v:1},
        {t:"Diminuzione prezzi",v:0},
        {t:"Nessun effetto",v:0}
      ]
    },
    {
      q:"Debito pubblico è:",
      a:[
        {t:"Debiti dello Stato",v:1},
        {t:"Risparmi privati",v:0},
        {t:"Tasse eliminate",v:0}
      ]
    }
  ],

  regionale:[
    {
      q:"Sanità inefficiente porta a:",
      a:[
        {t:"Liste d'attesa",v:1},
        {t:"Miglioramento automatico",v:0},
        {t:"Zero effetti",v:0}
      ]
    }
  ],

  comunale:[
    {
      q:"Traffico urbano si riduce con:",
      a:[
        {t:"Trasporto pubblico",v:1},
        {t:"Più auto",v:0},
        {t:"Nessuna regola",v:0}
      ]
    }
  ]
};

/* =========================
   STATE
========================= */

let state = {
  name:"",
  level:"",
  i:0,
  score:0,
  q:[]
};

const app = document.getElementById("app");

/* =========================
   HOME
========================= */

function home(){
  app.innerHTML = `
    <h2>Dashboard</h2>

    <input id="name" placeholder="Inserisci nome">

    <button class="primary" onclick="start('nazionale')">Nazionale</button>
    <button class="secondary" onclick="start('regionale')">Regionale</button>
    <button class="secondary" onclick="start('comunale')">Comunale</button>
  `;
}

home();

/* =========================
   START QUIZ
========================= */
