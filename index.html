<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patente di Consapevolezza Civica</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO PROVOCATORIA -->
<div id="intro" class="intro">

  <div class="intro-overlay">

    <div class="intro-box">

      <h1>Patente di Consapevolezza Civica</h1>

      <p class="hook">
        Per guidare un’auto serve una patente.<br>
        Per lavorare serve formazione.<br>
        Per votare… non serve nulla.
      </p>

      <p class="subhook">
        Ma se esistesse una patente del voto…<br>
        oggi tu la supereresti davvero?
      </p>

      <input id="nomeUtente" placeholder="Inserisci il tuo nome">

      <button onclick="avvia()" class="btn-primary">
        Inizia il test
      </button>

    </div>

  </div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

  <h2>Scegli il livello del test</h2>

  <div class="menu">

    <button onclick="selezionaLivello('nazionale')" class="btn-primary">
      🇮🇹 Nazionale
    </button>

    <button onclick="selezionaLivello('regionale')" class="btn-secondary">
      🏛 Regionale
    </button>

    <button onclick="selezionaLivello('comunale')" class="btn-secondary">
      🏙 Comunale
    </button>

  </div>

  <!-- SELETTORE TERRITORIO -->
  <div id="selector" class="selector">

    <h3>Seleziona territorio</h3>

    <select id="regioneSelect"></select>

    <button onclick="confermaRegione()" class="btn-primary">
      Avvia simulazione
    </button>

  </div>

</div>

<!-- QUIZ -->
<div id="quiz" class="quiz"></div>

<!-- REPORT -->
<div id="report" class="report"></div>

<script src="territori.js"></script>
<script src="comuni.js"></script>
<script src="app.js"></script>

</body>
</html>
