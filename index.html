<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Insight App Mode</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f1720;
  color:white;
}

.screen{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1c2633;
  padding:20px;
  border-radius:16px;
  margin-top:16px;
}

button{
  width:100%;
  padding:14px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}

.primary{background:#22c55e;color:#000;}
.secondary{background:#263445;color:#fff;}

.answer{
  background:#111827;
  color:white;
  border:1px solid #334155;
  text-align:left;
}

.answer:hover{
  background:#1f2937;
}

.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:20px;
  background:#334155;
  font-size:12px;
}

.title{
  font-size:22px;
  font-weight:700;
}

.big{
  font-size:26px;
  font-weight:800;
}
</style>
</head>

<body>

<div class="screen" id="app">Loading...</div>

<script>

/* ======================
   DATABASE
====================== */

const DB = {
  nazionale:[
    {cat:"Economia",q:"Cos'è l'inflazione?",a:[
      {t:"Aumento prezzi",v:1},
      {t:"Riduzione prezzi",v:0},
      {t:"Zero cambiamenti",v:0}
    ]},
    {cat:"Stato",q:"Debito pubblico è:",a:[
      {t:"Debiti dello Stato",v:1},
      {t:"Risparmi privati",v:0},
      {t:"Tasse locali",v:0}
    ]},
    {cat:"Sicurezza",q:"Sicurezza dipende da:",a:[
      {t:"Politiche pubbliche",v:1},
      {t:"Caso",v:0},
      {t:"Clima",v:0}
    ]}
  ],
  regionale:[
    {cat:"Sanità",q:"Liste attesa lunghe:",a:[
      {t:"Squilibrio sistema",v:1},
      {t:"Sistema perfetto",v:0}
    ]}
  ],
  comunale:[
    {cat:"Mobilità",q:"Traffico si riduce con:",a:[
      {t:"Trasporto pubblico",v:1},
      {t:"Più auto",v:0}
    ]}
  ]
};

/* ======================
   STATE MACHINE (APP)
====================== */

let state = {
  screen:"home",
  level:"",
  i:0,
  score:0,
  q:[],
  breakdown:{}
};

const app = document.getElementById("app");

/* ======================
   NAVIGATION
====================== */

function render(){
  if(state.screen==="home") return home();
  if(state.screen==="quiz") return quiz();
  if(state.screen==="result") return result();
}

/* ======================
   HOME
====================== */

function home(){
  app.innerHTML = `
    <div class="title">Citizen Insight</div>

    <div class="card">
      <button class="primary" onclick="start('nazionale')">Nazionale</button>
      <button class="secondary" onclick="start('regionale')">Regionale</button>
      <button class="secondary" onclick="start('comunale')">Comunale</button>
    </div>
  `;
}

/* ======================
   START QUIZ
====================== */

function start(level){
  state.level = level;
  state.q = DB[level];
  state.i = 0;
  state.score = 0;
  state.breakdown = {};
  state.screen = "quiz";
  render();
}

/* ======================
   QUIZ SCREEN
====================== */

function quiz(){

  const q = state.q[state.i];

  if(!q){
    state.screen="result";
    return render();
  }

  app.innerHTML = `
    <div class="badge">${state.level} · ${q.cat}</div>

    <div class="card">
      <div class="title">${q.q}</div>
    </div>

    <div class="card">
      ${q.a.map(x=>`
        <button class="answer" onclick="answer(${x.v},'${q.cat}')">${x.t}</button>
      `).join("")}
    </div>

    <div class="card">
      Domanda ${state.i+1} / ${state.q.length}
    </div>
  `;
}

/* ======================
   ANSWER
====================== */

function answer(v,cat){

  if(!state.breakdown[cat]){
    state.breakdown[cat]={ok:0,total:0};
  }

  state.breakdown[cat].total++;

  if(v){
    state.score++;
    state.breakdown[cat].ok++;
  }

  state.i++;
  render();
}

/* ======================
   RESULT SCREEN
====================== */

function result(){

  const total = state.q.length;
  const perc = Math.round((state.score/total)*100);

  app.innerHTML = `
    <div class="title">Report finale</div>

    <div class="card">
      <div class="big">${perc}%</div>
      <p>Consapevolezza generale</p>
    </div>

    <div class="card">
      <p>Risposte corrette: ${state.score} / ${total}</p>
      <p>Livello: ${perc<40?"Basso":perc<70?"Medio":"Alto"}</p>
    </div>

    <button class="primary" onclick="location.reload()">Ricomincia</button>
  `;
}

/* ======================
   INIT
====================== */

home();

</script>

</body>
</html>
