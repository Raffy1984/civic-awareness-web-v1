<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patente di Consapevolezza Civica</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

  <div id="home" class="card">
    <h1>Patente di Consapevolezza Civica</h1>

    <input id="username" placeholder="Inserisci il tuo nome">

    <button onclick="start('nazionale')">Test Nazionale</button>
    <button onclick="start('regionale')">Test Regionale</button>
    <button onclick="start('comunale')">Test Comunale</button>
  </div>

  <div id="quiz" class="card" style="display:none;"></div>

  <div id="result" class="card" style="display:none;"></div>

</div>

<script src="app.js"></script>

</body>
</html>
