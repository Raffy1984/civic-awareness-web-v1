<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Patente di Consapevolezza Civica</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro" class="intro">
  <div class="overlay">
    <div class="box">
      <h1>Patente di Consapevolezza Civica</h1>
      <p>Simulazione decisionale su temi pubblici reali. Le tue scelte determinano il profilo finale.</p>
      <input id="nomeUtente" placeholder="Inserisci il tuo nome">
      <button onclick="avvia()">Inizia</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard" style="display:none;">

  <h2>Seleziona livello</h2>

  <button onclick="selezionaLivello('nazionale')">🇮🇹 Nazionale</button>
  <button onclick="mostraRegioni()">🏛 Regionale</button>
  <button onclick="selezionaLivello('comunale')">🏙 Comunale (demo)</button>

  <!-- REGIONI -->
  <div id="selector" style="display:none; margin-top:20px;">
    <h3>Seleziona Regione</h3>

    <select id="regioneSelect"></select>

    <button onclick="confermaRegione()">Conferma Regione</button>
  </div>

</div>

<!-- QUIZ -->
<div id="quiz" class="quiz"></div>

<!-- REPORT -->
<div id="report" class="report"></div>

<script src="territori.js"></script>
<script src="app.js"></script>

</body>
</html>
