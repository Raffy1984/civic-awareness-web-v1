<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patente di Consapevolezza Civica</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">

  <div class="overlay">
    <div class="box">

      <h1>Patente di Consapevolezza Civica</h1>

      <p>
        Per guidare un’auto serve una patente.<br>
        Per votare invece no.
      </p>

      <input id="nomeUtente" placeholder="Nome"/>

      <button onclick="avvia()" class="primary">
        Inizia
      </button>

    </div>
  </div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

  <h2>Scegli livello di simulazione</h2>

  <div class="menu">

    <button class="btn-primary" onclick="selezionaLivello('nazionale')">
      🇮🇹 Nazionale
    </button>

    <button class="btn-secondary" onclick="selezionaLivello('regionale')">
      🏛 Regionale
    </button>

    <button class="btn-secondary" onclick="selezionaLivello('comunale')">
      🏙 Comunale
    </button>

  </div>

  <div id="selector" class="selector">

    <h3>Selezione territorio</h3>

    <select id="regioneSelect"></select>

    <button class="btn-primary" onclick="confermaRegione()">
      Avvia simulazione
    </button>

  </div>

</div>

<!-- QUIZ -->
<div id="quiz" class="quiz"></div>

<!-- REPORT -->
<div id="report" class="report"></div>

<script src="territori.js"></script>
<script src="comuni.js"></script>
<script src="app.js"></script>

</body>
</html>
