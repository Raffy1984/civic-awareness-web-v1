<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patente di Consapevolezza Civica</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050914;
  color:white;
}

/* INTRO */
.intro{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:url("https://upload.wikimedia.org/wikipedia/commons/0/03/Italy_satellite_map.jpg") center/cover no-repeat;
  position:relative;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.72);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.box{
  max-width:780px;
  text-align:center;
}

h1{
  font-size:40px;
  margin-bottom:10px;
}

p{
  opacity:0.85;
  line-height:1.6;
}

/* DASHBOARD */
.dashboard{
  display:none;
  padding:25px;
  max-width:900px;
  margin:auto;
}

.card{
  background:#0f172a;
  border:1px solid #1f2937;
  padding:18px;
  border-radius:14px;
  margin-top:14px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  cursor:pointer;
  font-weight:600;
}

.primary{background:#22c55e;color:#000;}
.secondary{background:#1f2937;color:#fff;}

/* QUIZ */
.quiz{
  display:none;
  padding:25px;
  max-width:900px;
  margin:auto;
}

.tag{
  font-size:12px;
  opacity:0.6;
}

.option{
  background:#111827;
  border:1px solid #334155;
  color:white;
  text-align:left;
}

.option:hover{
  background:#1e293b;
}

/* REPORT */
.report{
  display:none;
  padding:25px;
  max-width:900px;
  margin:auto;
}

.big{
  font-size:34px;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <div class="overlay">
    <div class="box">
      <h1>Patente di Consapevolezza Civica</h1>
      <p>
        Questo strumento non misura conoscenze.<br>
        Misura la capacità di valutare conseguenze reali su economia, sanità e società.
      </p>
      <button class="primary" onclick="startApp()">Inizia simulazione</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <h2>Seleziona scenario</h2>

  <div class="card">
    <button class="primary" onclick="start('nazionale')">🇮🇹 Nazionale</button>
    <button class="secondary" onclick="start('regionale')">🏛 Regionale</button>
    <button class="secondary" onclick="start('comunale')">🏙 Comunale</button>
  </div>
</div>

<!-- QUIZ -->
<div class="quiz" id="quiz"></div>

<!-- REPORT -->
<div class="report" id="report"></div>

<script>

/* =========================
   ENGINE
========================= */

const DB = {

  nazionale:[
    {
      cat:"Economia",
      scenario:"L’inflazione cresce costantemente da 14 mesi e il potere d’acquisto delle famiglie si riduce.",
      q:"Quale intervento è più equilibrato tra stabilità e impatto sociale?",
      options:[
        {t:"Aumentare salari e introdurre sostegni mirati",v:2},
        {t:"Bloccare prezzi dei beni essenziali",v:1},
        {t:"Ridurre la spesa pubblica in modo drastico",v:0},
        {t:"Non intervenire per mantenere equilibrio di mercato",v:1}
      ]
    },
    {
      cat:"Energia",
      scenario:"La dipendenza energetica estera espone il Paese a forti oscillazioni dei prezzi.",
      q:"Quale strategia riduce il rischio strutturale nel lungo periodo?",
      options:[
        {t:"Investimenti in rinnovabili e rete energetica nazionale",v:2},
        {t:"Sussidi temporanei alle bollette",v:1},
        {t:"Aumento tasse consumo energia",v:0},
        {t:"Controllo prezzi senza riforma infrastrutturale",v:0}
      ]
    },
    {
      cat:"Lavoro",
      scenario:"Il mercato del lavoro mostra precarietà diffusa tra i giovani.",
      q:"Quale politica affronta meglio il problema strutturale?",
      options:[
        {t:"Incentivi alle imprese per contratti stabili",v:2},
        {t:"Riduzione salario minimo",v:0},
        {t:"Aumento contratti a termine",v:0},
        {t:"Taglio contributi pensionistici",v:1}
      ]
    }
  ],

  regionale:[
    {
      cat:"Sanità",
      scenario:"Le liste d’attesa ospedaliere aumentano e il personale è insufficiente.",
      q:"Quale intervento è più efficace nel medio periodo?",
      options:[
        {t:"Assunzioni + riorganizzazione del sistema sanitario",v:2},
        {t:"Privatizzazione immediata dei servizi",v:0},
        {t:"Riduzione prestazioni non urgenti",v:1},
        {t:"Taglio budget ospedaliero",v:0}
      ]
    },
    {
      cat:"Trasporti",
      scenario:"Le infrastrutture regionali risultano obsolete e frammentate.",
      q:"Qual è la scelta più sostenibile?",
      options:[
        {t:"Piano infrastrutturale integrato regionale",v:2},
        {t:"Riduzione linee pubbliche non redditizie",v:0},
        {t:"Aumento tasse trasporto",v:0},
        {t:"Privatizzazione totale senza regolazione",v:1}
      ]
    }
  ],

  comunale:[
    {
      cat:"Mobilità",
      scenario:"Il traffico urbano aumenta e i tempi medi di spostamento peggiorano.",
      q:"Quale soluzione è più efficace nel medio periodo?",
      options:[
        {t:"Trasporto pubblico potenziato + limitazioni traffico",v:2},
        {t:"Aumento parcheggi centrali",v:0},
        {t:"Eliminazione ZTL",v:0},
        {t:"Riduzione controlli stradali",v:1}
      ]
    },
    {
      cat:"Sicurezza urbana",
      scenario:"In alcune aree urbane cresce la percezione di insicurezza.",
      q:"Qual è l’approccio più equilibrato?",
      options:[
        {t:"Investimenti in prevenzione e presenza sul territorio",v:2},
        {t:"Riduzione illuminazione pubblica",v:0},
        {t:"Ritiro forze dell’ordine dalle aree critiche",v:0},
        {t:"Aumento sanzioni senza interventi sociali",v:1}
      ]
    }
  ]
};

/* =========================
   STATE
========================= */

let state={
  level:"",
  i:0,
  score:0,
  data:[]
};

/* =========================
   FLOW
========================= */

function startApp(){
  document.getElementById("intro").style.display="none";
  document.getElementById("dashboard").style.display="block";
}

function start(level){
  state.level=level;
  state.data=DB[level];
  state.i=0;
  state.score=0;

  document.getElementById("dashboard").style.display="none";
  document.getElementById("quiz").style.display="block";

  render();
}

/* =========================
   RENDER
========================= */

function render(){

  const item=state.data[state.i];

  if(!item) return finish();

  document.getElementById("quiz").innerHTML=`
    <div class="card">
      <div class="tag">${state.level} · ${item.cat}</div>
      <h3>${item.scenario}</h3>
      <p><b>${item.q}</b></p>
    </div>

    <div class="card">
      ${item.options.map(o=>`
        <button class="option" onclick="answer(${o.v})">${o.t}</button>
      `).join("")}
    </div>

    <div class="card">
      ${state.i+1} / ${state.data.length}
    </div>
  `;
}

/* =========================
   ANSWER
========================= */

function answer(v){
  state.score += v;
  state.i++;
  render();
}

/* =========================
   REPORT
========================= */

function finish(){

  document.getElementById("quiz").style.display="none";
  document.getElementById("report").style.display="block";

  const max = state.data.length * 2;
  const perc = Math.round((state.score/max)*100);

  document.getElementById("report").innerHTML=`
    <div class="card">
      <h2>Indice Consapevolezza Civica</h2>
      <div class="big">${perc}%</div>
      <p>Valutazione basata su impatto delle decisioni selezionate</p>
    </div>

    <button class="primary" onclick="location.reload()">Ricomincia</button>
  `;
}

</script>

</body>
</html>
