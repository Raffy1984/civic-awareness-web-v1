<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Insight Step 1</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#eef3ea,#ffffff);
  color:#111;
}

.header{
  background:#1f3a2e;
  color:white;
  padding:14px 20px;
  font-weight:600;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:14px;
  padding:22px;
  margin-top:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
  border:1px solid #e6e6e6;
}

button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.answer{
  background:#fff;
  border:1px solid #ccc;
}

.answer:hover{
  background:#f3f6ef;
}

h2{margin-top:0}

</style>
</head>

<body>

<div class="header">
Citizen Insight Platform
</div>

<div class="container">
<div id="app"></div>
</div>

<script>

const DB = [
  {
    q:"Inflazione cosa significa?",
    a:[
      {t:"Aumento prezzi",v:1},
      {t:"Diminuzione prezzi",v:0}
    ]
  },
  {
    q:"Debito pubblico è:",
    a:[
      {t:"Debiti dello Stato",v:1},
      {t:"Risparmio privato",v:0}
    ]
  }
];

let i=0;
let score=0;

const app=document.getElementById("app");

function render(){

  const q=DB[i];

  if(!q){
    app.innerHTML=`
      <div class="card">
        <h2>Fine test</h2>
        <p>Punteggio: ${score}/${DB.length}</p>
        <button onclick="location.reload()">Riprova</button>
      </div>`;
    return;
  }

  app.innerHTML=`
    <div class="card">

      <h2>${q.q}</h2>

      ${q.a.map(x=>`
        <button class="answer" onclick="answer(${x.v})">${x.t}</button>
      `).join("")}

    </div>
  `;
}

function answer(v){
  if(v) score++;
  i++;
  render();
}

render();

</script>

</body>
</html>
