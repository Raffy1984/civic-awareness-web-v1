<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patente Civica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=SF+Pro+Text:wght@400;500;600&display=swap)" rel="stylesheet">
    <style>
        :root {
            /* Color System */
            --color-bg-primary: #FAFAFA;
            --color-bg-secondary: #FFFFFF;
            --color-bg-tertiary: #F5F5F7;
            --color-bg-elevated: #FFFFFF;
            
            --color-text-primary: #1D1D1F;
            --color-text-secondary: #86868B;
            --color-text-tertiary: #AEAEB2;
            
            --color-accent: #0071E3;
            --color-accent-hover: #0077ED;
            --color-success: #34C759;
            --color-warning: #FF9500;
            --color-error: #FF3B30;
            
            --color-border: rgba(0, 0, 0, 0.08);
            --color-border-strong: rgba(0, 0, 0, 0.12);
            
            /* Spacing */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 48px;
            --space-3xl: 64px;
            --space-4xl: 96px;
            
            /* Typography */
            --font-display: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-text: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            
            --text-xs: 12px;
            --text-sm: 14px;
            --text-base: 16px;
            --text-lg: 18px;
            --text-xl: 20px;
            --text-2xl: 24px;
            --text-3xl: 32px;
            --text-4xl: 40px;
            --text-5xl: 48px;
            
            /* Radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;
            
            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
            --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.16);
            
            /* Transitions */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Layout */
            --max-width: 1200px;
            --content-width: 680px;
        }
        
        /* Dark Mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --color-bg-primary: #000000;
                --color-bg-secondary: #1C1C1E;
                --color-bg-tertiary: #2C2C2E;
                --color-bg-elevated: #1C1C1E;
                
                --color-text-primary: #F5F5F7;
                --color-text-secondary: #A1A1A6;
                --color-text-tertiary: #636366;
                
                --color-border: rgba(255, 255, 255, 0.08);
                --color-border-strong: rgba(255, 255, 255, 0.12);
            }
        }
        
        /* Reset & Base */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
        }
        
        body {
            font-family: var(--font-text);
            font-size: var(--text-base);
            line-height: 1.5;
            color: var(--color-text-primary);
            background-color: var(--color-bg-primary);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }
        
        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-display);
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }
        
        h1 { font-size: var(--text-4xl); }
        h2 { font-size: var(--text-3xl); }
        h3 { font-size: var(--text-2xl); }
        h4 { font-size: var(--text-xl); }
        
        @media (max-width: 640px) {
            h1 { font-size: var(--text-3xl); }
            h2 { font-size: var(--text-2xl); }
            h3 { font-size: var(--text-xl); }
        }
        
        p {
            color: var(--color-text-secondary);
            line-height: 1.6;
        }
        
        /* Layout */
        .container {
            width: 100%;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 var(--space-lg);
        }
        
        .content-container {
            max-width: var(--content-width);
            margin: 0 auto;
        }
        
        /* Screen Management */
        .screen {
            display: none;
            min-height: 100vh;
            min-height: 100dvh;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity var(--transition-slow), transform var(--transition-slow);
        }
        
        .screen.active {
            display: flex;
            flex-direction: column;
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            padding: var(--space-md) var(--space-xl);
            font-family: var(--font-text);
            font-size: var(--text-base);
            font-weight: 500;
            text-decoration: none;
            border: none;
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }
        
        .btn-primary {
            background: var(--color-accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--color-accent-hover);
            transform: scale(1.02);
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        .btn-secondary {
            background: var(--color-bg-tertiary);
            color: var(--color-text-primary);
        }
        
        .btn-secondary:hover {
            background: var(--color-border-strong);
        }
        
        .btn-ghost {
            background: transparent;
            color: var(--color-accent);
        }
        
        .btn-ghost:hover {
            background: rgba(0, 113, 227, 0.08);
        }
        
        .btn-large {
            padding: var(--space-lg) var(--space-2xl);
            font-size: var(--text-lg);
        }
        
        .btn-full {
            width: 100%;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Cards */
        .card {
            background: var(--color-bg-elevated);
            border-radius: var(--radius-xl);
            padding: var(--space-xl);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
            transition: all var(--transition-base);
        }
        
        .card-interactive {
            cursor: pointer;
        }
        
        .card-interactive:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--color-accent);
        }
        
        .card-interactive.selected {
            border-color: var(--color-accent);
            background: rgba(0, 113, 227, 0.04);
        }
        
        /* Progress Bar */
        .progress-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--color-border);
            z-index: 1000;
        }
        
        .progress-bar {
            height: 100%;
            background: var(--color-accent);
            width: 0%;
            transition: width var(--transition-base);
        }
        
        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(250, 250, 250, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--color-border);
            z-index: 100;
            display: none;
        }
        
        @media (prefers-color-scheme: dark) {
            .nav {
                background: rgba(0, 0, 0, 0.8);
            }
        }
        
        .nav.visible {
            display: block;
        }
        
        .nav-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
        }
        
        .nav-logo {
            font-family: var(--font-display);
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--color-text-primary);
            text-decoration: none;
        }
        
        .nav-actions {
            display: flex;
            gap: var(--space-sm);
        }
        
        /* Hero Section */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            text-align: center;
            padding: var(--space-3xl) var(--space-lg);
        }
        
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            background: var(--color-bg-tertiary);
            border-radius: var(--radius-full);
            font-size: var(--text-sm);
            color: var(--color-text-secondary);
            margin-bottom: var(--space-xl);
        }
        
        .hero-title {
            max-width: 800px;
            margin-bottom: var(--space-lg);
        }
        
        .hero-subtitle {
            max-width
