<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEBUG QUIZ</title>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2}
.box{padding:20px;max-width:800px;margin:auto}
.card{background:white;padding:20px;margin-top:20px;border-radius:10px}
button{width:100%;padding:12px;margin:6px 0}
.error{color:red;white-space:pre-wrap}
</style>
</head>

<body>

<div class="box">
  <div id="app">Caricamento...</div>
</div>

<script>

try{

const app = document.getElementById("app");

const DB = [
  {
    q:"Inflazione cosa significa?",
    a:[
      {t:"Aumento prezzi",v:1},
      {t:"Diminuzione prezzi",v:0}
    ]
  },
  {
    q:"Debito pubblico è:",
    a:[
      {t:"Debito dello Stato",v:1},
      {t:"Risparmio privato",v:0}
    ]
  }
];

let i=0;
let score=0;

function render(){

  const q = DB[i];

  if(!q){
    app.innerHTML = `
      <div class="card">
        <h2>Fine test</h2>
        <p>Punteggio: ${score}/${DB.length}</p>
        <button onclick="location.reload()">Riprova</button>
      </div>`;
    return;
  }

  app.innerHTML = `
    <div class="card">
      <h2>${q.q}</h2>
      ${q.a.map((x,idx)=>`
        <button onclick="answer(${x.v})">${x.t}</button>
      `).join("")}
    </div>
  `;
}

function answer(v){
  if(v) score++;
  i++;
  render();
}

render();

}catch(e){

document.body.innerHTML =
"<div class='box error'><h2>ERRORE JS</h2><pre>"+e.message+"</pre></div>";

}

</script>

</body>
</html>
