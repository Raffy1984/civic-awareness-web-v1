<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patente Consapevolezza Civica</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#070b14;
  color:white;
}

/* ================= INTRO ================= */
.intro{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:url("https://upload.wikimedia.org/wikipedia/commons/0/03/Italy_satellite_map.jpg") center/cover no-repeat;
  position:relative;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.70);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.box{
  max-width:750px;
}

h1{
  font-size:38px;
  margin-bottom:10px;
}

p{
  opacity:0.85;
  line-height:1.6;
}

/* ================= DASHBOARD ================= */
.dashboard{
  display:none;
  padding:25px;
  max-width:900px;
  margin:auto;
}

.card{
  background:#111827;
  padding:18px;
  border-radius:14px;
  margin-top:14px;
  border:1px solid #1f2937;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  cursor:pointer;
  font-weight:600;
}

.primary{background:#22c55e;color:#000;}
.secondary{background:#1f2937;color:#fff;}

/* ================= QUIZ ================= */
.quiz{
  display:none;
  padding:25px;
  max-width:900px;
  margin:auto;
}

.tag{
  font-size:12px;
  opacity:0.6;
}

.option{
  background:#0f172a;
  border:1px solid #334155;
  color:white;
  text-align:left;
}

.option:hover{
  background:#1e293b;
}

/* ================= REPORT ================= */
.report{
  display:none;
  padding:25px;
  max-width:900px;
  margin:auto;
}

.metric{
  font-size:32px;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <div class="overlay">
    <div class="box">
      <h1>Patente di Consapevolezza Civica</h1>
      <p>
        Non misura ciò che sai.<br>
        Misura come reagisci a problemi reali che influenzano la società.
      </p>

      <button class="primary" onclick="startApp()">Inizia simulazione</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <h2>Scegli contesto</h2>

  <div class="card">
    <button class="primary" onclick="start('nazionale')">🇮🇹 Scenario Nazionale</button>
    <button class="secondary" onclick="start('regionale')">🏛 Scenario Regionale</button>
    <button class="secondary" onclick="start('comunale')">🏙 Scenario Comunale</button>
  </div>
</div>

<!-- QUIZ -->
<div class="quiz" id="quiz"></div>

<!-- REPORT -->
<div class="report" id="report"></div>

<script>

/* ==============================
   SCENARIO ENGINE (CORE)
============================== */

const DB = {
  nazionale:[
    {
      cat:"Economia reale",
      scenario:"L’inflazione cresce per 18 mesi consecutivi. Le famiglie riducono consumi e il governo deve intervenire.",
      q:"Quale strategia è più sostenibile nel medio periodo?",
      options:[
        {t:"Aumento salari e intervento fiscale mirato",v:2},
        {t:"Controllo prezzi generalizzato immediato",v:1},
        {t:"Riduzione spesa pubblica drastica",v:0},
        {t:"Nessun intervento per lasciare il mercato libero",v:1}
      ]
    },
    {
      cat:"Energia",
      scenario:"Il costo dell’energia aumenta per instabilità geopolitica e dipendenza estera.",
      q:"Quale scelta è più efficace strutturalmente?",
      options:[
        {t:"Investimenti massicci in rinnovabili e infrastrutture",v:2},
        {t:"Sussidi temporanei alle bollette",v:1},
        {t:"Aumento tasse energia per ridurre consumi",v:0},
        {t:"Blocco totale dei prezzi senza riforme",v:0}
      ]
    }
  ],

  regionale:[
    {
      cat:"Sanità",
      scenario:"Le liste d’attesa crescono e il personale sanitario è sotto pressione.",
      q:"Qual è l’intervento più equilibrato?",
      options:[
        {t:"Assunzioni + riorganizzazione strutturale del sistema",v:2},
        {t:"Privatizzazione rapida dei servizi",v:0},
        {t:"Riduzione prestazioni non urgenti",v:1},
        {t:"Taglio costi ospedalieri",v:0}
      ]
    }
  ],

  comunale:[
    {
      cat:"Mobilità urbana",
      scenario:"Una città registra traffico crescente e tempi medi di spostamento in aumento.",
      q:"Quale politica è più efficace nel medio termine?",
      options:[
        {t:"Trasporto pubblico potenziato + limitazioni traffico",v:2},
        {t:"Aumento parcheggi centrali",v:0},
        {t:"Eliminazione ZTL",v:0},
        {t:"Riduzione controlli stradali",v:1}
      ]
    }
  ]
};

/* ==============================
   STATE
============================== */

let state={
  level:"",
  i:0,
  score:0,
  data:[]
};

/* ==============================
   START FLOW
============================== */

function startApp(){
  document.getElementById("intro").style.display="none";
  document.getElementById("dashboard").style.display="block";
}

function start(level){
  state.level=level;
  state.data=DB[level];
  state.i=0;
  state.score=0;

  document.getElementById("dashboard").style.display="none";
  document.getElementById("quiz").style.display="block";

  render();
}

/* ==============================
   RENDER SCENARIO
============================== */

function render(){

  const item=state.data[state.i];

  if(!item) return finish();

  document.getElementById("quiz").innerHTML=`
    <div class="card">
      <div class="tag">${state.level} · ${item.cat}</div>
      <h3>${item.scenario}</h3>
      <p><b>${item.q}</b></p>
    </div>

    <div class="card">
      ${item.options.map(o=>`
        <button class="option" onclick="answer(${o.v})">${o.t}</button>
      `).join("")}
    </div>

    <div class="card">
      Progresso: ${state.i+1}/${state.data.length}
    </div>
  `;
}

/* ==============================
   ANSWER SYSTEM
============================== */

function answer(v){
  state.score += v;
  state.i++;
  render();
}

/* ==============================
   REPORT
============================== */

function finish(){

  document.getElementById("quiz").style.display="none";
  document.getElementById("report").style.display="block";

  let max = state.data.length * 2;
  let perc = Math.round((state.score / max) * 100);

  document.getElementById("report").innerHTML=`
    <div class="card">
      <h2>Indice di Consapevolezza</h2>
      <div class="metric">${perc}%</div>
      <p>Valutazione basata su impatto delle decisioni selezionate</p>
    </div>

    <button class="primary" onclick="location.reload()">Ricomincia simulazione</button>
  `;
}

</script>

</body>
</html>
