<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patente di Consapevolezza Civica</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- DASHBOARD INIZIALE -->
  <div id="home" class="hero-card">

    <h1>Patente di Consapevolezza Civica</h1>

    <p class="hook">
      Ogni giorno si parla di politica, economia, sicurezza e società.
      Ma comprendere le conseguenze delle decisioni pubbliche è un'altra cosa.
    </p>

    <p class="topics">
      Questo test non misura le tue opinioni.<br>
      Misura quanto conosci le conseguenze delle scelte reali.
    </p>

    <input id="username" placeholder="Nome (opzionale)">

    <button onclick="startTest()">Inizia il test</button>

  </div>


  <!-- QUIZ -->
  <div id="quiz" style="display:none;"></div>


  <!-- RISULTATO -->
  <div id="result" style="display:none;"></div>

</div>

<script src="app.js"></script>

</body>
</html>
