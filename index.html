<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patente di Consapevolezza Civica</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b1220;
  color:white;
}

/* INTRO */
.intro{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:
    url("https://upload.wikimedia.org/wikipedia/commons/0/03/Italy_satellite_map.jpg") center/cover no-repeat;
  position:relative;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.intro-box{
  max-width:700px;
}

h1{
  font-size:36px;
  margin-bottom:10px;
}

p{
  opacity:0.85;
  line-height:1.5;
}

/* DASHBOARD */
.dashboard{
  display:none;
  padding:20px;
  max-width:900px;
  margin:auto;
}

.card{
  background:#111a2e;
  padding:20px;
  border-radius:14px;
  margin-top:16px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  margin-top:10px;
}

.primary{background:#22c55e;color:#000;}
.secondary{background:#1f2937;color:#fff;}

/* QUIZ */
.quiz{
  display:none;
  padding:20px;
  max-width:900px;
  margin:auto;
}

.tag{
  font-size:12px;
  opacity:0.7;
}

.answer{
  background:#0f172a;
  border:1px solid #334155;
  color:white;
  text-align:left;
  margin-top:8px;
}

.answer:hover{
  background:#1e293b;
}

/* REPORT */
.report{
  display:none;
  padding:20px;
  max-width:900px;
  margin:auto;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <div class="overlay">
    <div class="intro-box">
      <h1>Patente di Consapevolezza Civica</h1>
      <p>
        Un sistema di simulazione delle decisioni pubbliche e dei loro effetti reali.<br>
        Non misura cosa sai. Misura come ragioni.
      </p>

      <button class="primary" onclick="goDashboard()">Inizia</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <h2>Scegli livello</h2>

  <div class="card">
    <button class="primary" onclick="start('nazionale')">🇮🇹 Nazionale</button>
    <button class="secondary" onclick="start('regionale')">🏛 Regionale</button>
    <button class="secondary" onclick="start('comunale')">🏙 Comunale</button>
  </div>
</div>

<!-- QUIZ -->
<div class="quiz" id="quiz"></div>

<!-- REPORT -->
<div class="report" id="report"></div>

<script>

/* =========================
   SHUFFLE FIX (CRUCIALE)
========================= */
function shuffle(arr){
  return arr
    .map(v => ({v, r:Math.random()}))
    .sort((a,b)=>a.r-b.r)
    .map(x=>x.v);
}

/* =========================
   DATABASE
========================= */

const DB = {
  nazionale:[
    {
      cat:"Economia reale",
      q:"Il costo della vita aumenta, ma gli stipendi restano fermi. Quale misura ha effetto immediato ma rischio inflattivo?",
      a:[
        {t:"Aumento salari pubblici generalizzato",v:1},
        {t:"Riduzione spesa sanitaria",v:0},
        {t:"Taglio investimenti pubblici",v:0},
        {t:"Aumento IVA sui beni essenziali",v:0}
      ]
    },
    {
      cat:"Energia",
      q:"Un aumento del costo energetico colpisce famiglie e imprese. Quale soluzione è strutturale ma lenta?",
      a:[
        {t:"Investimenti in rinnovabili",v:1},
        {t:"Sussidi temporanei carburanti",v:0},
        {t:"Riduzione salari pubblici",v:0},
        {t:"Controllo prezzi totale immediato",v:0}
      ]
    }
  ],

  regionale:[
    {
      cat:"Sanità",
      q:"Le liste d’attesa aumentano. Qual è la causa più probabile?",
      a:[
        {t:"Squilibrio tra domanda e risorse disponibili",v:1},
        {t:"Troppi medici inutilizzati",v:0},
        {t:"Nessuna domanda sanitaria",v:0},
        {t:"Eccesso di infrastrutture ospedaliere",v:0}
      ]
    }
  ],

  comunale:[
    {
      cat:"Mobilità",
      q:"Il traffico urbano è in crescita costante. Quale intervento è più efficace nel medio periodo?",
      a:[
        {t:"Potenziare trasporto pubblico",v:1},
        {t:"Aumentare parcheggi centrali",v:0},
        {t:"Rimuovere limiti traffico",v:0},
        {t:"Ridurre semafori",v:0}
      ]
    }
  ]
};

/* =========================
   STATE
========================= */

let state={
  level:"",
  i:0,
  score:0,
  q:[]
};

/* =========================
   NAV
========================= */

function goDashboard(){
  document.getElementById("intro").style.display="none";
  document.getElementById("dashboard").style.display="block";
}

/* =========================
   START
========================= */

function start(l){
  state.level=l;
  state.q=DB[l];
  state.i=0;
  state.score=0;

  document.getElementById("dashboard").style.display="none";
  document.getElementById("quiz").style.display="block";

  render();
}

/* =========================
   RENDER QUIZ
========================= */

function render(){

  const q=state.q[state.i];

  if(!q){
    return finish();
  }

  const shuffled = shuffle(q.a);

  document.getElementById("quiz").innerHTML=`
    <div class="card">
      <div class="tag">${state.level} · ${q.cat}</div>
      <h3>${q.q}</h3>
    </div>

    <div class="card">
      ${shuffled.map(x=>`
        <button class="answer" onclick="answer(${x.v})">${x.t}</button>
      `).join("")}
    </div>

    <div class="card">
      Domanda ${state.i+1} / ${state.q.length}
    </div>
  `;
}

/* =========================
   ANSWER
========================= */

function answer(v){
  if(v) state.score++;
  state.i++;
  render();
}

/* =========================
   REPORT
========================= */

function finish(){

  document.getElementById("quiz").style.display="none";
  document.getElementById("report").style.display="block";

  const perc = Math.round((state.score/state.q.length)*100);

  document.getElementById("report").innerHTML=`
    <div class="card">
      <h2>Risultato finale</h2>
      <h1>${perc}%</h1>
      <p>Consapevolezza su impatto delle decisioni pubbliche</p>
    </div>

    <button class="primary" onclick="location.reload()">Ricomincia</button>
  `;
}

/* INIT */
goDashboard();

</script>

</body>
</html>
