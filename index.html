<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patente di Consapevolezza Civica</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- HOME -->
  <div id="home" class="hero-card">

    <h1>Patente di Consapevolezza Civica</h1>

    <p class="hook">
      Scegli il livello del test
    </p>

    <input id="username" placeholder="Nome (opzionale)">

    <button onclick="startQuiz('nazionale')">Test Nazionale</button>
    <button onclick="startQuiz('regionale')">Test Regionale</button>
    <button onclick="startQuiz('comunale')">Test Comunale</button>

  </div>

  <!-- QUIZ -->
  <div id="quiz" style="display:none;"></div>

  <!-- RISULTATO -->
  <div id="result"></div>

</div>

<script src="app.js"></script>

</body>
</html>
