<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patente di Consapevolezza Civica</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- DASHBOARD -->
  <div id="home" class="card">

    <h1>Patente di Consapevolezza Civica</h1>

    <p class="sub">Dashboard iniziale</p>

    <input id="username" placeholder="Nome utente">

    <div class="grid">
      <button onclick="start('nazionale')">Nazionale</button>
      <button onclick="start('regionale')">Regionale</button>
      <button onclick="start('comunale')">Comunale</button>
    </div>

  </div>

  <!-- QUIZ -->
  <div id="quiz" class="card" style="display:none;"></div>

  <!-- RISULTATO -->
  <div id="result" class="card" style="display:none;"></div>

</div>

<script src="app.js"></script>

</body>
</html>
