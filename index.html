<html lang="it">

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#eef2e6,#ffffff);
  color:#1c1c1c;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:24px;
  margin-top:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  border:1px solid #d8e0d2;
}

h1{
  margin:0 0 10px 0;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-bottom:12px;
}

button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.primary{
  background:#2f4f3f;
  color:white;
}

.secondary{
  background:#e9efe6;
  color:#1c1c1c;
}

.answer{
  background:white;
  border:1px solid #cfd8cc;
}

.answer:hover{
  background:#f2f6ef;
}

.tag{
  display:inline-block;
  padding:4px 10px;
  font-size:12px;
  border-radius:20px;
  background:#e8efe3;
  margin-bottom:10px;
}
</style>
</head>

  <div id="app"></div>
</div>
